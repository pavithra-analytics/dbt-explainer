version: 2

models:
  - name: mart_seller_performance
    description: "Seller performance metrics including revenue, order volume, and delivery rates"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - not_null
      - name: total_orders
        description: "Total number of orders fulfilled by the seller"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by the seller in BRL"
      - name: delivery_rate_pct
        description: "Percentage of orders successfully delivered"

  - name: mart_customer_retention
    description: "Customer retention metrics including order frequency and customer segments"
    columns:
      - name: customer_unique_id
        description: "Unique identifier for each customer across multiple orders"
        tests:
          - not_null
      - name: customer_segment
        description: "Customer segment based on order frequency: one_time, occasional, or loyal"
        tests:
          - accepted_values:
              values: ['one_time', 'occasional', 'loyal']

  - name: mart_order_fulfillment
    description: "Order fulfillment metrics including delivery times and on-time performance"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
      - name: delivery_status
        description: "Whether order was delivered on_time, late, or is pending"
        tests:
          - accepted_values:
              values: ['on_time', 'late', 'pending']